name: Publish to Bcube cpanel
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Deploy via lftp
      env:
        FTP_SERVER: ${{ secrets.BCUBEWEBSITE_FTP_SERVER }}
        FTP_USER:   ${{ secrets.BCUBEWEBSITE_FTPSERVER_USER }}
        FTP_PASS:   ${{ secrets.BCUBEWEBSITE_FTPSERVER_PASS }}
      run: |
        sudo apt-get update -qq && sudo apt-get install -y lftp
        lftp -c "
          set ftp:ssl-allow no;
          set ftp:passive-mode on;
          set ftp:prefer-epsv no;
          set ftp:use-mlsd off;
          set net:timeout 15;
          set net:max-retries 2;
          set net:reconnect-interval-base 5;
          open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_SERVER\";
          mirror --reverse --verbose --exclude .git/ --exclude .github/ ./ ./;
        "
